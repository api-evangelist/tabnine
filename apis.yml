aid: tabnine
url: https://raw.githubusercontent.com/api-evangelist/tabnine/refs/heads/main/apis.yml
name: Tabnine
kind: company
description: >-
  Tabnine provides AI code completion, chat, and agentic workflows across IDEs and CLI,
  with strong support for SaaS, VPC, and air-gapped on-prem deployments. The Enterprise
  Context Engine indexes a customer's codebase, dependencies, and architecture. Tabnine's
  consumer surface is via IDE plugins (VS Code, JetBrains, Eclipse) and the Tabnine CLI;
  there is no general-purpose public REST inference API for end-developers.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI
  - Developer Tools
  - Code Completion
  - Self-Hosted
  - Enterprise
  - Privacy
