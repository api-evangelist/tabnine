  - aid: tabnine:enterprise
    name: Tabnine Enterprise (Admin Suite + Context Engine)
    description: >-
      Enterprise SKU with admin console (data analytics, model provisioning, context
      permissions, SSO), Enterprise Context Engine (codebase indexing), and flexible
      deployment (SaaS / VPC / Local / Air-Gapped). $39/user/month list price; custom
      enterprise contracts available.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
