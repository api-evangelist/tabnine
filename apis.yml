    name: Tabnine IDE Plugins
    description: >-
      VS Code, JetBrains (IntelliJ, PhpStorm, etc.), and Eclipse plugins surfacing
      autocomplete, chat, and agentic workflows. Communicates with Tabnine's hosted or
      self-hosted backend over a proprietary protocol.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
